<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo-Fi ChillSpace | Room</title>
    <meta name="description" content="A cozy digital room for studying, relaxing, and spending time with your companion.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/favicon.ico">
</head>
<body>

    <header>
        <nav>
            <h1>Lo-Fi ChillSpace</h1>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <a href="room.html" class="btn">Enter ChillSpace</a>
        </nav>
    </header>

    <main>
    <section id="study-room">

    <div class="room-scene">

        <div class="room-sky">
            <img src="image/background/window-day.png"
                 alt="Outside scenery">
        </div>

        <div class="room-background">
            <img src="image/room/room.png"
                 alt="Lo-Fi ChillSpace room">
        </div>

        <div class="room-companion">
            </div>

        <div class="room-ui">
            <div class="clock-widget">
                <p id="live-date"></p>
                <p id="live-time">12:00 PM</p>
        
            </div>
        </div>
    </div>
        <div class="pomodoro-widget">
            <h3>Pomodoro</h3>
            <div id="timer-display">
                25:00
            </div>

            <div class="timer-buttons">

                <button id="start-btn">
                    Start
                </button>

                <button id="pause-btn">
                    Pause
                </button>

                <button id="reset-btn">
                    Reset
                </button>

            </div>
    </div>
</section>
</main>

    <footer>
        <p>&copy; 2026 Lo-Fi ChillSpace. All rights reserved.</p>
    </footer>

<script src="js/room.js"></script>

</body>
</html>
