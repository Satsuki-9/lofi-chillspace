<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo-Fi ChillSpace | Room</title>
    <meta name="description"
        content="A cozy digital room for studying, relaxing, and spending time with your companion.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/satsuki.css">

</head>

<body>

    <header>
        <nav>
            <h1>Lo-Fi ChillSpace</h1>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <a href="room.html" class="btn">Enter ChillSpace</a>
        </nav>
    </header>

    <main>
        <section id="study-room">

            <div class="room-scene">

                <!--background-->
                <div class="room-sky">
                    <img src="image/background/window-day.png" alt="Outside scenery">
                </div>

                <!--mainroom-->
                <div class="room-background">
                    <img src="image/room/room.png" alt="Lo-Fi ChillSpace Room">
                </div>

                <!--Companion here-->
                <div class="room-companion">
                    <div id="satsuki-dialogue">
                        Hello! Let's do some tasks! ✨
                    </div>

                    <img id="satsuki-sprite" src="image/character/greeting.png" alt="Satsuki">
                </div>

                <!-- CLOCK -->
                <div class="clock-widget">

                    <p id="live-date"></p>
                    <p id="live-time"></p>

                </div>

                <!-- POMODORO -->
                <div class="pomodoro-widget">
                    <h3>Pomodoro</h3>

                    <!--WORK TIME-->
                    <div class="pomodoro-card">
                        <strong>Work Time</strong>
                        <div class="work-display">
                            <button id="work-minus">-</button>
                            <span id="work-minutes">10</span>
                            <button id="work-plus">+</button>
                        </div>
                    </div>

                    <!-- TIMER -->
                    <div class="pomodoro-card">
                        <div id="timer-display">
                            10:00
                        </div>
                    </div>

                    <!-- BREAK + SESSION -->
                    <div class="pomodoro-card">
                        <p>
                            Break :
                            <span id="break-minutes">5</span>
                        </p>

                        <p id="session-display">
                            Work • Session 1/4
                        </p>
                    </div>

                    <!-- CONTROLS -->
                    <div class="timer-buttons">
                        <button id="start-btn">
                            ▶
                        </button>

                        <button id="pause-btn">
                            ⏸
                        </button>

                        <button id="reset-btn">
                            ↺
                        </button>

                        <button id="cancel-btn">
                            ✕
                        </button>

                    </div>

                </div>

                <!-- LEFT PANEL -->
                <div id="left-panel">

                    <!-- NOTES -->

                    <div class="notes-widget panel" id="notes-panel">

                        <h3>Notes</h3>

                        <textarea id="notes-box" placeholder="Write something..."></textarea>

                        <div class="notes-buttons">

                            <button id="save-notes">
                                Save Notes
                            </button>

                            <button id="clear-notes">
                                Clear Notes
                            </button>

                        </div>

                    </div>

                    <!-- CALENDAR -->
                    <div class="calendar-widget panel hidden" id="calendar-panel">
                        <h3>Calendar</h3>
                        <div id="calendar-month">
                            July 2026
                        </div>
                        <div id="calendar-grid">
                        </div>
                    </div>

                    <!-- MUSIC -->
                    <div class="music-widget panel hidden" id="music-panel">
                        <p id="song-title">No Song Loaded</p>
                        <div class="music-controls">
                            <button id="prev-song">⏮</button>
                            <button id="play-song">▶</button>
                            <button id="next-song">⏭</button>
                        </div>
                    </div>

                </div>

                <!-- SHORTCUT BAR -->

                <div class="shortcut-bar">

                    <img id="notes-toggle" src="image/ui/notes-frame.png" alt="Notes">

                    <img id="calendar-toggle" src="image/ui/calendar-frame.png" alt="Calendar">

                    <img id="music-toggle" src="image/ui/music-frame.png" alt="Music">

                </div>

            </div>

        </section>

        <script src="js/room.js"></script>
        <script src="js/satsuki.js"></script>
        <script src="js/notes.js"></script>
        <script src="js/calendar.js"></script>
        <script src="js/music.js"></script>
</body>

</html>
