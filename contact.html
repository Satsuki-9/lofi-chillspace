<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo-Fi ChillSpace</title>
    <meta name="description" content="A cozy digital space to study, relax, and enjoy peaceful moments.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/favicon.ico">
</head>

<body>

    <header>
        <nav>
            <a href="index.html" class="logo">
                <img src="image/logo/logo.png" alt="Lo-Fi ChillSpace">
            </a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="room.html">
                <button>Enter ChillSpace</button>
            </a>
        </nav>
    </header>

    <main>

        <section id="contact-hero">
            <h2>Get in Touch</h2>
            <p>
                Have questions, suggestions, or simply want to say hello?
                We'd love to hear from you.
            </p>
        </section>

        <section id="contact-form">
            <form action="mailto:ashtartarin107@gmail.com" method="POST"> <!--Form Purposes-->

                <input type="hidden" name="_captcha" value="false">

                <input type="hidden" name="_subject" value="Lo-Fi ChillSpace Contact">

                <input type="hidden" name="_next" value="https://github.com/Satsuki-9/lofi-chillspace">

                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name">

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">

                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="Enter the subject">

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" placeholder="Write your message here..."></textarea>

                <button type="submit">Send Message</button>

            </form>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Lo-Fi ChillSpace. All rights reserved.</p>
    </footer>
</body>

</html>
